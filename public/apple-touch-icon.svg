<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg-large" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="180" height="180" rx="36" fill="url(#bg-large)"/>

  <!-- Document/script icon background -->
  <rect x="40" y="30" width="100" height="120" rx="8" fill="#c9a962" opacity="0.25"/>

  <!-- Document lines -->
  <rect x="52" y="46" width="76" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="52" y="58" width="60" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="52" y="70" width="70" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="52" y="82" width="50" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Stylized 'S' -->
  <text x="90" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="900" fill="#c9a962" text-anchor="middle" style="text-shadow: 0 4px 8px rgba(0,0,0,0.4)">S</text>
</svg>
