<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptScope Logo Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas {
            border: 2px solid #ddd;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
        }
        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #0a1628;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #1a2f4a;
            transform: translateY(-2px);
        }
        .info {
            text-align: center;
            color: #666;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1 style="color: #0a1628; margin-bottom: 10px;">ScriptScope Logo</h1>
    <div class="info">
        <p>Click the button below to download your 1080x1080px logo as PNG</p>
    </div>

    <canvas id="logoCanvas" width="1080" height="1080"></canvas>

    <button onclick="downloadLogo()">Download Logo (PNG)</button>

    <script>
        const canvas = document.getElementById('logoCanvas');
        const ctx = canvas.getContext('2d');

        // Brand colors
        const navy = '#0a1628';
        const gold = '#c9a962';

        // Draw navy background
        ctx.fillStyle = navy;
        ctx.fillRect(0, 0, 1080, 1080);

        // Draw thin gold circle
        ctx.strokeStyle = gold;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(540, 540, 400, 0, Math.PI * 2);
        ctx.stroke();

        // Draw bold stylized 'S'
        ctx.fillStyle = gold;
        ctx.font = 'bold 600px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('S', 540, 560);

        function downloadLogo() {
            const link = document.createElement('a');
            link.download = 'scriptscope-logo-1080x1080.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
