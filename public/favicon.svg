<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Document/script icon background -->
  <rect x="6" y="4" width="20" height="24" rx="2" fill="#c9a962" opacity="0.3"/>

  <!-- Stylized 'S' -->
  <text x="16" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="900" fill="#c9a962" text-anchor="middle" style="text-shadow: 0 1px 2px rgba(0,0,0,0.3)">S</text>
</svg>
